[pytest]
# Playwright + E2E + NPC/scale testing for The Internet Party
# The live Flask server fixture in tests/conftest.py starts PlotterApp on a free port.
# Run (server auto-started by fixture; requires `pipenv install --dev` + one-time `pipenv run playwright install`):
#   pipenv run pytest tests/e2e/ -q --browser chromium
#   pipenv run pytest tests/e2e/ --browser chromium --headed
# Also supports external --base-url if overriding live_server fixture.
addopts = -ra --strict-markers --tb=short
testpaths = tests
markers =
    e2e: end-to-end browser tests
    scale: scale / npc driver scenarios (may be slower)
# Playwright base URL can also be passed --base-url http://localhost:5000 (fixture yields the live one)
# Storage state, window overrides, and test data cleanup handled in conftest
# Use Database helpers for overrides/cleanup (bypasses UI auth for test control)
