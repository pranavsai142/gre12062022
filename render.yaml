# Render Blueprint for The Internet Party (Party No. 3)
# https://render.com/docs/blueprint-spec
#
# Deploy via Blueprint (recommended) or as a manual Web Service.
#
# For manual services, set in dashboard:
#   Build Command: pip install --upgrade pip && pip install pipenv && pipenv install --deploy --ignore-pipfile
#   Start Command: ./start.sh
#
# Python version: Set PYTHON_VERSION=3.13 as an environment variable in Render
# (or rely on runtime.txt + the value below). runtime.txt declares python-3.13.
#
# Firebase: Upload the admin JSON as a Secret File with the exact name below.
# It will be mounted at /etc/secrets/. Set DATA_FOLDER=/etc/secrets/
#
# REQUIRED: theinternetparty-5b902-firebase-adminsdk-qlzzx-3864b82b40.json
# (mounted by Render at /etc/secrets/)
#
# Scaling path (documented from the 2026-07 scale work):
#   ~100 concurrent voters: this single instance (2 workers x 8 threads) is enough;
#     validated with the NPC harness (see TESTING.md, scale tests).
#   ~10k: raise numInstances (paid plans autoscale), keep RTDB chatter per request
#     low (cache ballot reads), and consider upgrading the plan before sharding.

services:
  - type: web
    name: internet-party
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install pipenv && pipenv install --deploy --ignore-pipfile
    startCommand: ./start.sh
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true          # stable per-service session key (all workers share it)
      - key: DATA_FOLDER
        value: /etc/secrets/         # where Render mounts Secret Files
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "8"
      - key: PYTHON_VERSION
        value: "3.13"
