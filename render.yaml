# Render Blueprint for The Internet Party (Party No. 3)
# https://render.com/docs/blueprint-spec
#
# IMPORTANT: This file is ONLY used when you deploy via "New > Blueprint".
# If you created the service as a regular "Web Service", render.yaml is ignored
# and you must copy settings manually into the dashboard.
#
# To use this file properly:
#   1. New → Blueprint → select this repo
#   2. It will create/update the service using the values below.
#
# Manual fallback values (copy these if not using Blueprint):
#   Build Command:   pip install --upgrade pip && pip install pipenv && pipenv install --deploy --ignore-pipfile
#   Start Command:   ./start.sh
#
# runtime.txt in the repo also helps Render pick Python 3.13.
#
# Firebase secret must still be attached manually in the dashboard as a Secret File.
#
# REQUIRED SECRET FILE (exact name):
#   theinternetparty-5b902-firebase-adminsdk-qlzzx-3864b82b40.json
#   → mounted at /etc/secrets/
#   → set DATA_FOLDER=/etc/secrets/
#
# Optional but recommended:
#   OPERATOR_EMAILS=you@example.com,other@... (comma sep; restricts operator actions)

services:
  - type: web
    name: internet-party
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install pipenv && pipenv install --deploy --ignore-pipfile
    startCommand: ./start.sh
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_FOLDER
        value: /etc/secrets/
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_THREADS
        value: "8"
      - key: PYTHON_VERSION
        value: "3.13"

# Scaling notes:
# ~100 concurrent: fine on starter (2 workers x 8 threads)
# ~10k: increase instances on paid plans + reduce per-request DB chatter
