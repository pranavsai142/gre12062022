# CI for The Internet Party
#
# - compile: always runs, no secrets, fast syntax/import check.
# - e2e: full Playwright + NPC harness. Requires FIREBASE_SERVICE_ACCOUNT secret
#   (admin JSON). Skipped cleanly when the secret is not present.
#
# E2E uses isolated E2E-TEST-* windows + prefix cleanup on the real Firebase project.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Syntax-check every Python source
        run: python -m compileall -q . -x '(\.venv|node_modules)'

  e2e:
    runs-on: ubuntu-latest
    needs: compile
    # Run full E2E (NPC + Playwright) when the FIREBASE_SERVICE_ACCOUNT secret is present.
    # Job-level `if` cannot read env vars defined on the *same* job (GHA rule) — using
    # secrets directly is the supported pattern. Without this fix the e2e job never ran
    # even after the secret was configured.
    # The secret is required because tests talk to real Firebase (isolated test data only).
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps + browser
        run: |
          pip install pipenv
          pipenv install --dev
          pipenv run playwright install chromium --with-deps
      - name: Write Firebase service account
        run: |
          mkdir -p "$RUNNER_TEMP/data"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/data/theinternetparty-5b902-firebase-adminsdk-qlzzx-3864b82b40.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Run E2E suite (isolated E2E-TEST windows, auto-cleanup)
        run: |
          export DATA_FOLDER="$RUNNER_TEMP/data/"
          pipenv run pytest tests/e2e/ -q --browser chromium
